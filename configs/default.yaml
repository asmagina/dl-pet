seed: 42
device: cuda

data:
  root: data/mvtec
  category: bottle
  image_size: 256
  batch_size: 32
  num_workers: 4

model:
  name: simple_cnn
  in_channels: 3
  num_classes: 2

train:
  epochs: 50
  lr: 1.0e-3
  weight_decay: 1.0e-4
  checkpoint_dir: runs/checkpoints
  log_every: 10

eval:
  checkpoint: runs/checkpoints/best.pt
